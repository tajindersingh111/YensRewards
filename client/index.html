<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Loyalty rewards system for Yens Thai Ice Cream - Nakhon Sawan, Thailand" />
    
    <!-- PWA Manifest (dynamically loaded based on route) -->
    <link rel="manifest" id="app-manifest" href="/manifest.json" />
    <script>
      // Dynamically load the correct manifest and update meta tags based on route
      (function() {
        const path = window.location.pathname;
        const manifestLink = document.getElementById('app-manifest');
        
        if (path.startsWith('/customer')) {
          manifestLink.href = '/manifest-customer.json';
          document.title = 'Yens Customer';
          document.querySelector('meta[name="theme-color"]').content = '#FCD34D';
          document.querySelector('meta[name="apple-mobile-web-app-title"]').content = 'Yens Customer';
        } else if (path.startsWith('/barista')) {
          manifestLink.href = '/manifest-barista.json';
          document.title = 'Yens Barista';
          document.querySelector('meta[name="theme-color"]').content = '#1E40AF';
          document.querySelector('meta[name="apple-mobile-web-app-title"]').content = 'Yens Barista';
        } else if (path.startsWith('/admin')) {
          manifestLink.href = '/manifest-admin.json';
          document.title = 'Yens Admin';
          document.querySelector('meta[name="theme-color"]').content = '#1E40AF';
          document.querySelector('meta[name="apple-mobile-web-app-title"]').content = 'Yens Admin';
        } else {
          manifestLink.href = '/manifest.json';
        }
      })();
    </script>
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#FCD34D" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Yens" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/pwa-icon-192.png" />
    
    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>Yens Loyalty System</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
