<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Loyalty rewards system for Yens Thai Ice Cream - Nakhon Sawan, Thailand" />
    
    <!-- CRITICAL: Unregister ALL service workers IMMEDIATELY -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister().then(function(success) {
              console.log('✅ Service Worker unregistered:', success);
            });
          }
        });
        
        // Also clear any cached service worker
        if (navigator.serviceWorker.controller) {
          navigator.serviceWorker.controller.postMessage({type: 'SKIP_WAITING'});
        }
      }
      
      // FORCE viewport to device width programmatically (Android fix)
      (function() {
        var viewport = document.querySelector('meta[name=viewport]');
        if (viewport) {
          viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover');
        }
        
        // Additional Android-specific fix - phones only (tablets need normal scroll)
        const isAndroidPhone = /android/i.test(navigator.userAgent) && window.innerWidth < 768;
        if (isAndroidPhone) {
          document.documentElement.style.width = '100%';
          document.documentElement.style.overflowX = 'hidden';
          // Never set overflow:hidden (y-axis) - it blocks vertical scrolling
        }
      })();
    </script>
    
    <!-- PWA Manifest (dynamically loaded based on route) -->
    <link rel="manifest" id="app-manifest" href="/manifest.json" />
    <script>
      // Dynamically load the correct manifest and update meta tags based on route
      (function() {
        const path = window.location.pathname;
        const manifestLink = document.getElementById('app-manifest');
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        const appleTitleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
        
        if (path.startsWith('/customer')) {
          if (manifestLink) manifestLink.href = '/manifest-customer.json?v=3.17.4';
          document.title = 'Yens Rewards';
          if (themeColorMeta) themeColorMeta.content = '#FCD34D';
          if (appleTitleMeta) appleTitleMeta.content = 'Yens Rewards';
          // Update apple-touch-icon for customer app
          var appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
          if (appleIcon) appleIcon.href = '/yens-apple-touch-v39.png?v=3.17.4';
        } else if (path.startsWith('/barista')) {
          if (manifestLink) manifestLink.href = '/manifest-barista.json';
          document.title = 'Yens Barista';
          if (themeColorMeta) themeColorMeta.content = '#1E40AF';
          if (appleTitleMeta) appleTitleMeta.content = 'Yens Barista';
        } else if (path.startsWith('/admin')) {
          if (manifestLink) manifestLink.href = '/manifest-admin.json';
          document.title = 'Yens Admin';
          if (themeColorMeta) themeColorMeta.content = '#1E40AF';
          if (appleTitleMeta) appleTitleMeta.content = 'Yens Admin';
        } else {
          if (manifestLink) manifestLink.href = '/manifest.json';
        }
      })();
    </script>
    
    <!-- ANDROID SCALING FIX: Detect Android using modern API + fallback -->
    <script>
      (function() {
        const viewportWidth = window.innerWidth;
        
        // Store viewport width for debugging
        document.documentElement.dataset.vw = viewportWidth;
        
        // ANDROID DETECTION - always trust the UA string as ground truth
        // Xiaomi/HyperOS, Samsung, and other tablets all contain "Android" in UA
        const ua = navigator.userAgent;
        const isAndroid = /android/i.test(ua);
        
        // Determine phone vs tablet purely by viewport width
        // Xiaomi Pad 6S Pro: ~800px portrait / ~1280px landscape (both > 768)
        // Standard Android phones: 360-430px CSS width
        const isTablet = viewportWidth >= 768;
        
        console.log('📱 Device:', isAndroid ? 'Android' : 'iOS/Desktop', '| Tablet:', isTablet, '| Viewport:', viewportWidth, 'px');
        console.log('UA:', ua.substring(0, 120));
        
        if (isAndroid && !isTablet) {
          // Android PHONE only — apply 50% font boost for small-screen scaling
          document.documentElement.style.fontSize = '24px';
          document.documentElement.classList.add('android-scale');
          console.log('✅ Android phone — applying 24px font boost');
        } else {
          // Tablets and non-Android devices — standard 16px
          document.documentElement.style.fontSize = '16px';
          console.log('✅ Standard 16px — no scaling boost needed');
        }
        
        // Store detected type for CSS use
        if (isTablet) document.documentElement.classList.add('is-tablet');
      })();
    </script>
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#FCD34D" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Yens" />
    <link rel="apple-touch-icon" href="/yens-apple-touch-v39.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/pwa-icon-192.png" />
    
    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>Yens Loyalty System</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
